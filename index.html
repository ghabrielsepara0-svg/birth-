<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sarah MAEEEE TABAA PISNGEEE!</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to top, #ff99cc, #ffe6f0);
}

/* TITLE */
h1 {
    margin-top: 30px;
    color: white;
    font-size: 50px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 25px yellow; }
}

/* FRAME */
.frame {
    position: relative;
    width: 460px;
    height: 460px;
    margin: 20px auto;
    border: 15px solid #d4af37;
    border-radius: 20px;
    background: #fff0f5;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

/* POLAROID */
.polaroid {
    position: absolute;
    width: 120px;
    background: white;
    padding: 10px 10px 25px 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    border-radius: 5px;
    text-align: center;
    font-size: 12px;
}

.polaroid img {
    width: 100%;
    border-radius: 5px;
}

/* POSITIONS */
.p1 { top: 20px; left: 30px; transform: rotate(-10deg); }
.p2 { top: 30px; right: 30px; transform: rotate(8deg); }
.p3 { bottom: 40px; left: 50px; transform: rotate(6deg); }
.p4 { bottom: 20px; right: 40px; transform: rotate(-8deg); }
.p5 { top: 150px; left: 160px; transform: rotate(-2deg); }

/* BUTTON CARD */
.card {
    margin-top: 10px;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    background: #ff3399;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#message {
    margin-top: 10px;
    font-size: 18px;
    color: white;
}

/* CONFETTI */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<h1>🎂 Happy Birthday Sarah 🎂</h1>

<div class="frame">

    <div class="polaroid p1">
        <img src="images.jpeg">
        <p>tamang selfie lang</p>
    </div>

    <div class="polaroid p2">
        <img src="images.jpeg">
        <p>Love Sexy💖</p>
    </div>

    <div class="polaroid p3">
        <img src="images.jpeg">
        <p>Sexy Naman Niyan Aken nalang yan </p>
    </div>

    <div class="polaroid p4">
        <img src="images.jpeg">
        <p>BULAGA</p>
    </div>

    <div class="polaroid p5">
        <img src="images.jpeg">
        <p> Enjoy Happy Birthday 💖 </p>
    </div>

</div>

<div class="card">
    <button onclick="startParty()"> Pa Pisil Pisngee Sige na :( </button>
    <p id="message"></p>

    <audio id="music">
        <source src="birthday.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
// 🎁 Messages
const messages = [
    " ISA LANG😢  ",
    "EDI DON'T😠 ",
    "🎉Happy Birthday Sarah Taba pisngeeeee... ENJOY YOUR BIRTHDAY ❤️"
];

function startParty() {
    const msg = messages[Math.floor(Math.random() * messages.length)];
    document.getElementById("message").innerHTML = msg;

    document.getElementById("music").play().catch(()=>{});
    launchConfetti();
}

// 🎊 CONFETTI
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let confetti = [];

function launchConfetti() {
    confetti = [];
    for (let i = 0; i < 150; i++) {
        confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 6 + 2,
            d: Math.random() * 50,
            color: "hsl(" + Math.random() * 360 + ", 100%, 50%)"
        });
    }
    draw();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < confetti.length; i++) {
        let c = confetti[i];
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fillStyle = c.color;
        ctx.fill();

        c.y += 2;
        if (c.y > canvas.height) c.y = 0;
    }
    requestAnimationFrame(draw);
}
</script>

</body>
</html>
